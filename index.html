<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmSmart | Innovation in Agriculture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>FarmSmart</h1>
    </nav>

    <main>
        <!-- Weather Section -->
        <section id="weather" class="card">
            <h2>Local Weather</h2>
            <div id="weather-display">Loading weather...</div>
        </section>

        <!-- Market Section -->
        <section id="market" class="card">
            <h2>Market Watch</h2>
            <div class="price-grid">
                <div class="price-item">Wheat: <span id="wheat-price">--</span></div>
                <div class="price-item">Rice: <span id="rice-price">--</span></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>



</body>
</html>
